name: Keep Streamlit App Awake

on:
  schedule:
    # Runs every 6 hours — comfortably inside Streamlit's 12-hour sleep window.
    # Cron times are UTC.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}   # lets you also trigger it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Visit the app and wake it if asleep
        env:
          APP_URL: "https://value-based-lab-score.streamlit.app/"
        run: python keepalive.py
